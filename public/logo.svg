<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Hexagon coin background -->
  <defs>
    <linearGradient id="lg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4f8fff"/>
      <stop offset="55%" stop-color="#29d0d0"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
  </defs>
  <!-- Outer hexagon -->
  <path d="M16 2.5 26 7.5v17l-10 5.5-10-5.5v-17l10-5.5Z" fill="url(#lg)" stroke="white" stroke-width="0.8" stroke-linejoin="round"/>
  <!-- Inner gem shape -->
  <path d="M16 7.5l6 3.5v10l-6 3.5-6-3.5v-10l6-3.5Z" fill="white" opacity="0.95"/>
  <!-- Inner cutout -->
  <path d="M12 11.5 16 9.5l4 2v8l-4 2-4-2v-8Z" fill="url(#lg)" opacity="0.9"/>
</svg>
